<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - I Care Services</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            color: #2c5aa0;
            margin-bottom: 30px;
        }
        .logo h2 {
            margin: 0;
            font-size: 24px;
        }
        .logo span {
            font-size: 14px;
            color: #666;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            margin: 20px 0;
            box-sizing: border-box;
        }
        button {
            background: #2c5aa0;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }
        button:hover {
            background: #1e3d6f;
        }
        .error {
            color: #e74c3c;
            margin-top: 10px;
            display: none;
        }
        .info {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h2>I Care Services</h2>
            <span>Providers Ltd</span>
        </div>
        <div class="info">
            This is a private preview of our website.<br>
            Please enter the access code to continue.
        </div>
        <form id="loginForm">
            <input type="password" id="password" placeholder="Enter access code" required>
            <button type="submit">Access Website</button>
            <div class="error" id="error">Incorrect access code. Please try again.</div>
        </form>
    </div>

    <script>
        const correctPassword = 'eyecare2024';
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            
            if (password === correctPassword) {
                // Set a session flag
                sessionStorage.setItem('authenticated', 'true');
                // Redirect to main site
                window.location.href = 'main.html';
            } else {
                document.getElementById('error').style.display = 'block';
                document.getElementById('password').value = '';
            }
        });
    </script>
</body>
</html>
